name: Build ELKFileSaver dylib

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 读取版本号
        run: |
          VER=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION=$VER" >> $GITHUB_ENV
          echo "📦 版本: v$VER"

      - name: 编译 dylib
        run: |
          chmod +x build.sh
          ./build.sh

      - name: 上传 dylib
        uses: actions/upload-artifact@v4
        with:
          name: ELKFileSaver_v${{ env.VERSION }}
          path: output/ELKFileSaver_*.dylib
          retention-days: 7

      - name: 完成
        run: |
          echo ""
          echo "══════════════════════════════════════════"
          echo "  下载 ELKFileSaver_v${{ env.VERSION }}"
          echo "  解压得到 ELKFileSaver_v${{ env.VERSION }}.dylib"
          echo "  传到手机 → TrollFools 注入到 eLink"
          echo "══════════════════════════════════════════"
